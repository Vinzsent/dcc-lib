name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to /var/www/html
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Ensure the web directory exists
            sudo mkdir -p /var/www/html
            
            # Fix ownership so your user can write to it
            sudo chown -R $USER:$USER /var/www/html
            
            # Navigate to the web directory
            cd /var/www/html
            
            # If this is the first deployment, clone the repo
            if [ ! -d ".git" ]; then
              git clone https://github.com/Vinzsent/dcc-lib.git .
            else
              git pull origin main
            fi
            
            # Set proper permissions for web files
            sudo chown -R www-data:www-data /var/www/html
            sudo chmod -R 755 /var/www/html
            
            # Restart Apache to apply changes (optional)
            sudo systemctl restart apache2
